name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kyc
          POSTGRES_PASSWORD: kyc
          POSTGRES_DB: kyc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kyc -d kyc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgres://kyc:kyc@localhost:5432/kyc
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: test-openai-key
      ANTHROPIC_API_KEY: ""
      OLLAMA_BASE_URL: http://localhost:11434
      RESEND_API_KEY: ""
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: kyc-evidence
      ENCRYPTION_KEY: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
      JWT_SECRET: test-access-secret-change-me
      JWT_REFRESH_SECRET: test-refresh-secret-change-me
      ALLOWED_ORIGINS: http://localhost:3000
      PROXY_LIST: ""
      RATE_LIMIT_API_PER_MINUTE: 100
      RATE_LIMIT_AUTH_PER_MINUTE: 10
      LOG_LEVEL: error
      OTEL_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image
        run: docker build -t kyc-copilot:ci .
