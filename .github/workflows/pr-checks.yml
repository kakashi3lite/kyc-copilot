# ──────────────────────────────────────────────────────────────────────────────
# KYC Copilot — Pull Request Pipeline
#
# Parallel gates (typecheck + unit + integration + SAST + LLM-mock
# validation) then ephemeral Fly.io preview per PR, with automatic
# teardown on PR close. Database isolation: each preview app gets its
# own short-lived Neon Postgres branch via `DATABASE_URL` env var so
# PR databases never collide with production.
#
# DAG:
#
#   opened/reopened/synchronize ─┬─► typecheck (Node 20 + 22 matrix)
#                                ├─► unit-tests
#                                ├─► integration-tests
#                                ├─► sast
#                                └─► llm-mock-validation
#                                       │
#                                       ▼
#                                deploy-preview  (Fly ephemeral app)
#
#   closed  ──► teardown-preview  (fly apps destroy)
# ──────────────────────────────────────────────────────────────────────────────

name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_ORG: ${{ secrets.FLY_ORG }}
  FLY_REGION: ${{ secrets.FLY_REGION || 'ams' }}

jobs:
  typecheck:
    name: Typecheck (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - run: npm rebuild bcrypt 2>/dev/null || true
      - run: npm run typecheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - run: npm rebuild bcrypt 2>/dev/null || true
      - run: npm run test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kyc
          POSTGRES_PASSWORD: kyc
          POSTGRES_DB: kyc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kyc -d kyc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://kyc:kyc@localhost:5432/kyc
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_KEY: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
      JWT_SECRET: test-access-secret-change-me
      JWT_REFRESH_SECRET: test-refresh-secret-change-me
      API_KEY_LOOKUP_SECRET: test-lookup-secret-change-me
      ALLOWED_ORIGINS: http://localhost:3000
      RATE_LIMIT_API_PER_MINUTE: 100
      RATE_LIMIT_AUTH_PER_MINUTE: 10
      LLM_TIER_PRIMARY: t0
      LLM_SYNC_ALLOWED_TIERS: t0
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: kyc-evidence
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - run: npm rebuild bcrypt 2>/dev/null || true
      - run: npx drizzle-kit migrate
      - run: npm run test -- tests/integration

  sast:
    name: SAST (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - run: npm audit --audit-level=high

  # Validates that the LLM mock setup file is wired in correctly and
  # that the DynamicLlmRouter is interceptable. Cheap; gates accidental
  # removal of the mock.
  llm-mock-validation:
    name: LLM mock validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Assert mock setup file exists
        run: test -f tests/setup/llm-mock.ts
      - name: Run a single integration test with the mock active
        run: npx vitest run tests/integration/api/auth.test.ts --setupFiles ./tests/setup/llm-mock.ts
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://kyc:kyc@localhost:5432/kyc
          REDIS_URL: redis://localhost:6379
          ENCRYPTION_KEY: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
          JWT_SECRET: t
          JWT_REFRESH_SECRET: t
          API_KEY_LOOKUP_SECRET: t
          LLM_TIER_PRIMARY: t0

  # ── Ephemeral preview deploy ─────────────────────────────────────────────
  # Uses superfly/fly-pr-review-apps which auto-creates a per-PR Fly app,
  # deploys to it, and (on PR close) destroys it. The `environment:`
  # block makes the preview URL show up in the PR UI.
  deploy-preview:
    name: Fly.io preview app
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests, integration-tests, sast, llm-mock-validation]
    if: github.event.action != 'closed'
    timeout-minutes: 15
    environment:
      name: pr-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy PR app to Fly.io
        id: deploy
        uses: superfly/fly-pr-review-apps@1.2.1
        with:
          # Isolate DB per PR — Neon branching-style. For self-hosted
          # Postgres, swap for a per-PR schema URL.
          secrets: |
            DATABASE_URL=${{ secrets.PREVIEW_DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            API_KEY_LOOKUP_SECRET=${{ secrets.API_KEY_LOOKUP_SECRET }}

  # ── Teardown: triggered on PR close ──────────────────────────────────────
  teardown-preview:
    name: Teardown preview app
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    timeout-minutes: 5
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Destroy preview app
        run: flyctl apps destroy "kyc-copilot-pr-${{ github.event.number }}" --yes || echo "preview app already gone"
      - name: Drop preview database branch (if Neon)
        # No-op unless you wire PREVIEW_NEON_API_KEY + project id. The
        # Neon branch was created at preview-deploy time with a TTL.
        if: env.PREVIEW_NEON_API_KEY != ''
        run: echo "Neon branch auto-expires; no action required"
        env:
          PREVIEW_NEON_API_KEY: ${{ secrets.PREVIEW_NEON_API_KEY }}