# ──────────────────────────────────────────────────────────────────────────────
# KYC Copilot — Deploy Pipeline
# Triggers on push to main. Runs checks, then deploys to Fly.io (ams region).
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

# Cancel in-flight deploys when a newer commit lands on main
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  # ── Job 1: Typecheck & Test ──────────────────────────────────────────────
  checks:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Rebuild native addons
        run: npm rebuild bcrypt 2>/dev/null || true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://kyc:kyc@localhost:5432/kyc
          REDIS_URL: redis://localhost:6379

  # ── Job 2: Security Scan (SAST) ──────────────────────────────────────────
  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Run NPM Audit
        # Run audit. If audit fails due to high/critical vuln, block deploy.
        run: npm audit --audit-level=high

  # ── Job 3: Deploy to Fly.io ─────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io (ams)
    runs-on: ubuntu-latest
    needs: [checks, security-scan]
    timeout-minutes: 20
    # Only deploy from main, never from forks
    if: github.ref == 'refs/heads/main' && github.repository == 'kakashi3lite/kyc-copilot'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Amsterdam (ams)
        run: flyctl deploy --remote-only --region ams --strategy rolling
