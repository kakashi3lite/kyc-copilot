# ──────────────────────────────────────────────────────────────────────────────
# KYC Copilot — Deploy Pipeline (parallel DAG)
#
# Trigger: push to main. Runs checks + SAST + SBOM in parallel; deploys
# to Fly.io only when all gates pass.
#
# DAG:
#
#   push ─┬─► checks        (typecheck + test)
#         ├─► security-scan  (npm audit + CycloneDX SBOM)
#         └─► docker-build   (smoke build of the production image)
#              │
#              ▼
#         fly-preflight   (apps create, volumes create, secrets set)
#              │
#              ▼
#         deploy          (rolling deploy to Fly.io)
#
# The three "early" jobs run concurrently. CI wall time = max(checks,
# security-scan, docker-build), not their sum — typically a 50%+ cut vs
# the previous linear chain.
#
# Required GitHub Secrets:
#   FLY_API_TOKEN             — fly org token
#   FLY_ORG                   — Fly org slug
#   DATABASE_URL, REDIS_URL   — runtime backing services
#   ENCRYPTION_KEY, JWT_SECRET, JWT_REFRESH_SECRET
#   S3_ENDPOINT, S3_ACCESS_KEY, S3_SECRET_KEY, S3_BUCKET
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY  (optional)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_APP: ${{ secrets.FLY_APP || 'kyc-copilot' }}
  FLY_ORG: ${{ secrets.FLY_ORG }}
  FLY_REGION: ${{ secrets.FLY_REGION || 'ams' }}

jobs:
  # ── Parallel gate 1: typecheck + test ─────────────────────────────────
  checks:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts
      - name: Rebuild native addons
        run: npm rebuild bcrypt 2>/dev/null || true
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://kyc:kyc@localhost:5432/kyc
          REDIS_URL: redis://localhost:6379
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  # ── Parallel gate 2: SAST + SBOM generation ────────────────────────────
  security-scan:
    name: Security Scan (SAST + SBOM)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Run NPM Audit (blocks deploy on high/critical)
        run: npm audit --audit-level=high

      - name: Generate CycloneDX SBOM
        # CycloneDX 1.6 JSON. --omit dev keeps the SBOM aligned with
        # what the production Dockerfile actually installs (it runs
        # `npm ci --omit=dev`).
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --output-format JSON --output-file sbom.cdx.json --spec-version 1.6 --omit dev

      - name: Upload SBOM artifact
        # 90-day retention satisfies the TBS / FINTRAC "evidence
        # integrity" review window for federal procurement.
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
          if-no-files-found: error

  # ── Parallel gate 3: smoke build of production image ───────────────────
  docker-build:
    name: Docker Build (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t kyc-copilot:ci .

  # ── Sequential gate: Fly state provisioning ────────────────────────────
  fly-preflight:
    name: Fly preflight (app / volume / secrets)
    runs-on: ubuntu-latest
    needs: [checks, security-scan, docker-build]
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.repository == 'kakashi3lite/kyc-copilot'
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure Fly app exists
        run: flyctl apps create "$FLY_APP" --org "$FLY_ORG" || echo "app already exists — continuing"
      - name: Ensure persistent volume exists
        run: flyctl volumes create kyc_data --app "$FLY_APP" --region "$FLY_REGION" --size 1 --yes || echo "volume already exists — continuing"
      - name: Set Fly secrets (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          API_KEY_LOOKUP_SECRET: ${{ secrets.API_KEY_LOOKUP_SECRET }}
        run: |
          set -e
          ARGS=()
          for k in DATABASE_URL REDIS_URL ENCRYPTION_KEY JWT_SECRET JWT_REFRESH_SECRET \
                   S3_ENDPOINT S3_ACCESS_KEY S3_SECRET_KEY S3_BUCKET \
                   OPENAI_API_KEY ANTHROPIC_API_KEY GOOGLE_API_KEY API_KEY_LOOKUP_SECRET; do
            v="${!k:-}"
            if [ -n "$v" ]; then ARGS+=("$k=$v"); fi
          done
          if [ ${#ARGS[@]} -gt 0 ]; then
            flyctl secrets set --app "$FLY_APP" "${ARGS[@]}"
          else
            echo "no Fly secrets configured in repo; skipping"
          fi

  # ── Final: production deploy ────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [fly-preflight]
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.repository == 'kakashi3lite/kyc-copilot'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app "$FLY_APP" --region "$FLY_REGION" --strategy rolling