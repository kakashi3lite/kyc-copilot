<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KYC-Copilot Dashboard</title><style>:root{--bg:#f7f9fc;--fg:#121826;--card:#fff;--b:#2457ff}body.dark{--bg:#0d111a;--fg:#eef2ff;--card:#151b28}body{margin:0;background:var(--bg);color:var(--fg);font-family:Inter,system-ui,sans-serif}header,main{max-width:1180px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:320px 1fr;gap:18px}.card{background:var(--card);border-radius:18px;padding:18px;box-shadow:0 12px 40px #17203314}input,button,select{padding:10px;border-radius:10px;border:1px solid #ccd4e0}button{background:var(--b);color:white;border:0;cursor:pointer}table{width:100%;border-collapse:collapse}td,th{padding:10px;border-bottom:1px solid #d8deea;text-align:left}.drawer{position:fixed;right:0;top:0;bottom:0;width:min(560px,92vw);background:var(--card);padding:24px;box-shadow:-20px 0 60px #0002;overflow:auto;display:none}.drawer.open{display:block}@media(max-width:850px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>KYC-Copilot</h1><button id="theme">Toggle dark mode</button></header><main class="grid"><section class="card"><h2>New case</h2><input id="key" placeholder="Bearer API key"><input id="name" placeholder="Company name" value="Test BV"><input id="reg" placeholder="Registration number" value="12345678"><select id="jur"><option>NL</option><option>DE</option><option>GB</option></select><button id="create">Start KYC</button><h2>Bulk actions</h2><button id="approve">Bulk approve selected</button></section><section class="card"><h2>Case queue</h2><table><thead><tr><th></th><th>Case</th><th>Status</th><th>Risk</th></tr></thead><tbody id="rows"></tbody></table></section></main><aside id="drawer" class="drawer"><button id="close">Close</button><pre id="detail"></pre></aside><script>const b=document.body,k=localStorage.theme;if(k==='dark'||(!k&&matchMedia('(prefers-color-scheme:dark)').matches))b.classList.add('dark');theme.onclick=()=>{b.classList.toggle('dark');localStorage.theme=b.classList.contains('dark')?'dark':'light'};const auth=()=>({Authorization:`Bearer ${document.getElementById('key').value}`});async function load(){const r=await fetch('/cases',{headers:auth()});if(!r.ok)return;const j=await r.json();rows.innerHTML=j.cases.map(c=>`<tr><td><input type=checkbox value="${c.id}"></td><td><button data-id="${c.id}">${c.companyName}</button></td><td>${c.status}</td><td>${c.riskScore}</td></tr>`).join('')}create.onclick=async()=>{await fetch('/cases',{method:'POST',headers:{...auth(),'content-type':'application/json'},body:JSON.stringify({companyName:name.value,registrationNumber:reg.value,jurisdiction:jur.value})});await load()};rows.onclick=async e=>{const id=e.target.dataset?.id;if(!id)return;const r=await fetch(`/cases/${id}`,{headers:auth()});detail.textContent=JSON.stringify(await r.json(),null,2);drawer.classList.add('open')};close.onclick=()=>drawer.classList.remove('open');approve.onclick=async()=>{for(const c of document.querySelectorAll('tbody input:checked'))await fetch(`/cases/${c.value}/approve`,{method:'POST',headers:{...auth(),'content-type':'application/json'},body:JSON.stringify({notes:'bulk approved'})});await load()};new EventSource('/cases/stream').onmessage=load;</script></body></html>
